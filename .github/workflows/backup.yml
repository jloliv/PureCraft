name: Repository backup (tar.gz artifact)

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create archive
        run: |
          mkdir -p backups
          tar --exclude=.git -czf "backups/PureCraft-$(date -u +'%Y%m%dT%H%M%SZ').tar.gz" .

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: purecraft-backup
          path: backups/*.tar.gz
          retention-days: 30
